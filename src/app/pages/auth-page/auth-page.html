<div class="flex flex-col h-full w-full">
    <header class="h-15 w-screen flex justify-center text-white shrink-0">
        <div class="h-full w-[30vh] flex justify-around flex-col"> 
            <div class="w-full flex justify-around pt-3">
                <button
                    routerLink="/auth/login"
                    routerLinkActive="text-[#C63031]"
                >
                    LOG IN
                </button>

                <button
                    routerLink="/auth/signup"
                    routerLinkActive="text-[#C63031]"
                >
                    SIGN UP
                </button>
            </div>

            <div [class.translate-x-full]="filter() === 'signup'"
                class=" w-1/2 h-0.5 bg-[#C63031] transition-transform duration-300 ease-out">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto flex justify-center items-center">
        <div class="w-[35vw] h-[50vh] flex flex-col justify-around items-center">
            @if(filter() === 'login'){
                <div class="flex flex-col items-center gap-8">
                    <p class="text-4xl text-white">Welcome back</p>
                    <p class="text-white text-[1.1em]">Hello again! Log in to continue</p>
                </div>

                <div class="flex flex-col w-full">
                    <mat-form-field 
                        appearance="outline"
                        class="w-ful"
                    >
                        <mat-label>Email</mat-label>
  
                        <input 
                            matInput  
                            placeholder="example@mail.com"
                        >
                    </mat-form-field>


                    <mat-form-field 
                        appearance="outline"
                        class="w-ful"
                    >
                        <mat-label>Password</mat-label>
  
                        <input 
                            matInput  
                            type="password"
                            placeholder="Enter your password"
                        >
                    </mat-form-field>
                </div>

                <div class="flex flex-col items-center gap-5">
                    <button 
                        matButton="filled"
                        class="bg-[#C63031]! px-23! py-6!"
                    >
                        LOG IN
                    </button>

                    <a href="" class="text-[#767676]">FORGOT PASSWORD</a>
                </div>
            }
        </div>
    </main>
</div>
