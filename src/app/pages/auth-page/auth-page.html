<div class="flex flex-col h-full w-full font-light">
    <header class="h-15 w-screen flex justify-center shrink-0">
        <nav mat-tab-nav-bar [tabPanel]="tabPanel">
            <a 
                class="px-13!"
                mat-tab-link 
                routerLink="/auth/login"
                routerLinkActive
                #rla1="routerLinkActive"
                [active]="rla1.isActive"
            >LOG IN</a>

            <a 
                class="px-13!"
                mat-tab-link 
                routerLink="/auth/signup"
                routerLinkActive
                #rla2="routerLinkActive"
                [active]="rla2.isActive"
            >SIGN UP</a>
        </nav>

        <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
    </header>

    <main class="flex-1 overflow-y-auto flex justify-center items-center">
        <!-- mat-tab-nav-panel должен оборачивать router-outlet, а не находиться внутри header -->
            <router-outlet></router-outlet>
    </main>
</div>
