<main class="w-[550px] min-w-[300px] px-[15px] flex flex-col gap-10 justify-around items-center">
    <div class="flex flex-col items-center gap-8">
                    <p class="text-[35px] text-white">Register now</p>
                    <p class="text-white text-[1.1em]">Welcome! Sign up to continue</p>
                </div>

                <div class="flex flex-col w-full">
                    <mat-form-field 
                        appearance="outline"
                        class="w-ful"
                    >
                        <mat-label>Email</mat-label>
  
                        <input 
                            [(ngModel)] = 'email'
                            matInput  
                            placeholder="example@mail.com"
                        >
                    </mat-form-field>


                    <mat-form-field 
                        appearance="outline"
                        class="w-ful"
                    >
                        <mat-label>Password</mat-label>
  
                        <input 
                            [(ngModel)] = 'password'
                            matInput  
                            [type] = "hidePassword() ? 'password' : 'text'"
                            placeholder="Enter your password"
                        >

                        <button

                            mat-icon-button
                            matSuffix
                            type="button"
                            (click)="hidePassword.update(val => !val)"
                            class="mr-3"
                        >
                            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
                        </button>
                    </mat-form-field>
                </div>

                <div class="flex flex-col items-center gap-5">
                    <button 
                        matButton="filled"
                        class="bg-[#C63031]! px-14! py-6!"
                        (click)="submitForm()"
                    >
                        CREATE ACCOUNT
                    </button>

                    <a routerLink="/auth/login" class="text-[#767676] font-bold">I HAVE AN ACCOUNT</a>
                </div>
</main>
