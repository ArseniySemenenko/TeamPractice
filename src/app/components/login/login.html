<main class="w-[550px] min-w-[300px] px-[15px] flex flex-col gap-10 justify-around items-center">
    <div class="flex flex-col items-center gap-8">
        <p class="text-[35px] text-white">Welcome back</p>
        <p class="text-white text-[1.1em]">Hello again! Log in to continue</p>
    </div>

    <div class="flex flex-col w-full">
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Email</mat-label>

            <input [(ngModel)]="email" matInput type="email" placeholder="example@mail.com" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Password</mat-label>

            <input
                [(ngModel)]="password"
                matInput
                [type]="hidePassword() ? 'password' : 'text'"
                placeholder="Enter your password"
            />

            <button
                mat-icon-button
                matSuffix
                type="button"
                (click)="hidePassword.update((val) => !val)"
                class="mr-3"
            >
                <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
        </mat-form-field>
    </div>

    <div class="flex flex-col items-center gap-5">
        <button matButton="filled" class="px-23! py-6!" (click)="submitForm()">LOG IN</button>

        <a routerLink="/forgot-password" class="text-[#767676] font-bold">FORGOT PASSWORD</a>
    </div>
</main>
