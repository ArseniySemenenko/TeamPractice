<main class="h-full w-full flex items-center justify-center">
<div class="w-[550px] min-w-[300px] px-[15px] flex flex-col gap-10 justify-around items-center">
    <div class="flex flex-col items-center gap-8">
                    <p class="text-4xl text-white">Forgor password</p>
                    <p class="text-white text-[1.1em]">We will sent you an email with further instructions</p>
                </div>

                <div class="flex flex-col w-full">
                    <mat-form-field 
                        appearance="outline"
                        class="w-ful"
                    >
                        <mat-label>Email</mat-label>
  
                        <input 
                            [(ngModel)] = 'email'
                            matInput  
                            placeholder="example@mail.com"
                        >
                    </mat-form-field>

                </div>

                <div class="flex flex-col items-center gap-5">
                    <button 
                        matButton="filled"
                        class="bg-[#C63031]! px-14! py-6!"
                        (click)="submitForm()"
                    >
                        RESET PASSWORD
                    </button>

                    <a routerLink="/auth/login" class="text-[#767676]">CANCEL</a>
                </div>
</div>
</main>
